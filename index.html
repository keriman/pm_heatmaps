<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Mapas de Calor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        #map {
            flex-grow: 1; 
        }
        #heatmap-controls {
            transition: opacity 0.3s ease-in-out;
        }
        .form-label {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <header class="p-3 bg-light border-bottom shadow-sm">
        <div class="container-fluid">
            <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
                <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-dark text-decoration-none">
                    <span class="fs-4">Visor de Mapas de Calor</span>
                </a>

                <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                </ul>

                <div class="d-flex align-items-center col-12 col-lg-auto">
                    <div id="loader" class="spinner-border text-primary me-3" role="status" style="display: none;">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                    <input type="file" class="form-control me-3" id="fileInput" accept=".xlsx, .xls">
                    <div id="heatmap-controls" class="d-flex align-items-center" style="opacity: 0.5; pointer-events: none;">
                        <div class="me-3">
                            <label for="radius" class="form-label">Radio: <span id="radius-value">25</span></label>
                            <input type="range" class="form-range" id="radius" min="1" max="50" value="25">
                        </div>
                        <div>
                            <label for="blur" class="form-label">Desenfoque: <span id="blur-value">15</span></label>
                            <input type="range" class="form-range" id="blur" min="1" max="30" value="15">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const map = L.map('map').setView([20.5, -100.3], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            let heatLayer = null;
            let currentHeatData = [];

            const fileInput = document.getElementById('fileInput');
            const loader = document.getElementById('loader');
            const heatmapControls = document.getElementById('heatmap-controls');
            const radiusSlider = document.getElementById('radius');
            const blurSlider = document.getElementById('blur');
            const radiusValueSpan = document.getElementById('radius-value');
            const blurValueSpan = document.getElementById('blur-value');

            function redrawHeatmap() {
                if (heatLayer) map.removeLayer(heatLayer);
                if (currentHeatData.length === 0) return;

                heatLayer = L.heatLayer(currentHeatData, { 
                    radius: parseInt(radiusSlider.value, 10),
                    blur: parseInt(blurSlider.value, 10),
                    maxZoom: 18,
                }).addTo(map);
            }

            fileInput.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (!file) return;

                loader.style.display = 'block';
                const reader = new FileReader();

                reader.onload = function (event) {
                    try {
                        const data = event.target.result;
                        const workbook = XLSX.read(data, { type: 'binary' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet);
                        
                        currentHeatData = jsonData.map(row => {
                            const lat = row.latitud || row.LATITUD;
                            const lon = row.longitud || row.LONGITUD;
                            const parsedLat = parseFloat(lat);
                            const parsedLon = parseFloat(lon);
                            const intensity = parseFloat(row.intensidad || 1.0);

                            if (isNaN(parsedLat) || isNaN(parsedLon)) return null;
                            return [parsedLat, parsedLon, intensity];
                        }).filter(p => p !== null);

                        if (currentHeatData.length === 0) {
                            alert("No se encontraron datos de coordenadas válidos en el archivo.");
                            heatmapControls.style.opacity = '0.5';
                            heatmapControls.style.pointerEvents = 'none';
                            if(heatLayer) map.removeLayer(heatLayer);
                            return;
                        }

                        heatmapControls.style.opacity = '1';
                        heatmapControls.style.pointerEvents = 'auto';
                        redrawHeatmap();
                        map.setView([19.702879635698825, -101.19232863317521], 12);

                    } catch (error) {
                        console.error("Error al procesar el archivo:", error);
                        alert("Hubo un error al procesar el archivo.");
                    } finally {
                        loader.style.display = 'none';
                    }
                };

                reader.onerror = function(error) {
                    console.error("Error al leer el archivo:", error);
                    alert("No se pudo leer el archivo.");
                    loader.style.display = 'none';
                };

                reader.readAsBinaryString(file);
            });

            radiusSlider.addEventListener('input', function() {
                radiusValueSpan.textContent = this.value;
                redrawHeatmap();
            });

            blurSlider.addEventListener('input', function() {
                blurValueSpan.textContent = this.value;
                redrawHeatmap();
            });
        });
    </script>

</body>
</html>
