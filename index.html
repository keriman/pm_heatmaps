<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Mapas de Calor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" />
    <style>
        html, body {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        #map {
            flex-grow: 1;
        }
        #heatmap-controls {
            transition: opacity 0.3s ease-in-out;
        }
        .form-label {
            margin-bottom: 0;
        }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            line-height: 24px;
            font-size: 14px;
        }
        .legend h4 {
            margin: 0 0 8px 0;
            font-size: 16px;
            font-weight: bold;
        }
        .legend-item {
            margin: 4px 0;
        }
        .legend-color {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 8px;
            border: 2px solid #333;
            vertical-align: middle;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <header class="p-3 bg-light border-bottom shadow-sm">
        <div class="container-fluid">
            <div class="d-flex flex-wrap align-items-center justify-content-between mb-3">
                <a href="/" class="d-flex align-items-center text-dark text-decoration-none">
                    <span class="fs-4">Visor de Mapas de Calor</span>
                </a>

                <div class="d-flex align-items-center">
                    <div id="loader" class="spinner-border text-primary me-3" role="status" style="display: none;">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                    <input type="file" class="form-control" id="fileInput" accept=".xlsx, .xls" style="width: 300px;">
                </div>
            </div>

            <div class="d-flex flex-wrap align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <div id="filter-controls" class="d-flex align-items-center me-3" style="opacity: 0.5; pointer-events: none;">
                        <div class="me-2">
                            <label for="startDate" class="form-label">Desde</label>
                            <input type="date" class="form-control" id="startDate">
                        </div>
                        <div class="me-2">
                            <label for="endDate" class="form-label">Hasta</label>
                            <input type="date" class="form-control" id="endDate">
                        </div>
                        <div class="me-2">
                            <label for="tipoFilter" class="form-label">TIPO</label>
                            <select class="form-select" id="tipoFilter" multiple></select>
                        </div>
                        <button id="filterBtn" class="btn btn-primary align-self-end">Filtrar</button>
                    </div>

                    <div id="heatmap-controls" class="d-flex align-items-center me-3" style="opacity: 0.5; pointer-events: none;">
                        <div class="me-3">
                            <label for="radius" class="form-label">Radio: <span id="radius-value">25</span></label>
                            <input type="range" class="form-range" id="radius" min="1" max="50" value="25">
                        </div>
                        <div>
                            <label for="blur" class="form-label">Desenfoque: <span id="blur-value">15</span></label>
                            <input type="range" class="form-range" id="blur" min="1" max="30" value="15">
                        </div>
                    </div>
                </div>

                <div class="d-flex align-items-center">
                    <div class="form-check me-3">
                        <input class="form-check-input" type="checkbox" id="toggleCuadrantes" checked>
                        <label class="form-check-label" for="toggleCuadrantes">
                            Cuadrantes
                        </label>
                    </div>
                    <div class="form-check me-3">
                        <input class="form-check-input" type="checkbox" id="toggleSectores" checked>
                        <label class="form-check-label" for="toggleSectores">
                            Sectores
                        </label>
                    </div>
                    <div>
                        <label for="sectoresOpacity" class="form-label">Opacidad: <span id="opacity-value">35</span>%</label>
                        <input type="range" class="form-range" id="sectoresOpacity" min="0" max="100" value="35" style="width: 120px;">
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="cuadrantes.min.js"></script>
    <script src="sectores.min.js"></script>

    <script>
        (function() {
            const devtools = { open: false };
            const element = new Image();

            Object.defineProperty(element, 'id', {
                get: function() {
                    devtools.open = true;
                }
            });

            setInterval(function() {
                console.clear();
            }, 1000);

            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12' ||
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                    (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S'))) {
                    e.preventDefault();
                    return false;
                }
            });

            let devtoolsOpen = false;
            const threshold = 160;

            setInterval(function() {
                const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                const heightThreshold = window.outerHeight - window.innerHeight > threshold;

                if (widthThreshold || heightThreshold) {
                    if (!devtoolsOpen) {
                        devtoolsOpen = true;
                    }
                } else {
                    devtoolsOpen = false;
                }
            }, 500);

            if (typeof cuadrantesKML !== 'undefined' && typeof sectoresKML !== 'undefined') {
                Object.defineProperty(window, 'cuadrantesKML', {
                    get: function() { return undefined; },
                    set: function() {}
                });
                Object.defineProperty(window, 'sectoresKML', {
                    get: function() { return undefined; },
                    set: function() {}
                });
            }
        })();

        document.addEventListener('DOMContentLoaded', function () {
            const map = L.map('map').setView([20.5, -100.3], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            const coloresSectores = {
                'Centro': '#FF1493',              
                'Independencia': '#00BFFF',        
                'Independencia Sur': '#32CD32',    
                'Nueva España': '#FFD700',        
                'República': '#FF4500',            
                'República Poniente': '#9370DB',   
                'Revolución': '#00CED1'           
            };

            const cuadrantesLayer = L.layerGroup().addTo(map);
            const cuadrantesBlob = new Blob([cuadrantesKML], { type: 'application/vnd.google-earth.kml+xml' });
            const cuadrantesURL = URL.createObjectURL(cuadrantesBlob);
            const customLayerCuadrantes = L.geoJson(null, {
                style: function(feature) {
                    return {
                        color: '#000000',      
                        weight: 2,
                        opacity: 0.8,
                        fillOpacity: 0,        
                        fillColor: 'transparent'
                    };
                },
                onEachFeature: function(feature, layer) {
                    const nombre = feature.properties.nombre || 'Sin nombre';
                    const sector = feature.properties.nom_sec || '';
                    layer.bindPopup(`<b>Cuadrante: ${nombre}</b><br>Sector: ${sector}`);
                }
            });

            const cuadrantesKMLLayer = omnivore.kml(cuadrantesURL, null, customLayerCuadrantes);
            cuadrantesKMLLayer.on('ready', function() {
                this.addTo(cuadrantesLayer);
                URL.revokeObjectURL(cuadrantesURL); 
            });

            const sectoresLayer = L.layerGroup().addTo(map);
            const sectoresBlob = new Blob([sectoresKML], { type: 'application/vnd.google-earth.kml+xml' });
            const sectoresURL = URL.createObjectURL(sectoresBlob);
            const customLayerSectores = L.geoJson(null, {
                style: function(feature) {
                    const nombre = feature.properties.nombre || 'Sin nombre';
                    const color = coloresSectores[nombre] || '#808080';
                    return {
                        color: color,
                        weight: 4,
                        opacity: 1,
                        fillOpacity: 0.35,
                        fillColor: color
                    };
                },
                onEachFeature: function(feature, layer) {
                    const nombre = feature.properties.nombre || 'Sin nombre';
                    const responsable = feature.properties.responsable || '';
                    const color = coloresSectores[nombre] || '#808080';
                    layer.bindPopup(`<b>Sector: ${nombre}</b><br>Responsable: ${responsable}<br><span style="color:${color}">●</span> Color identificador`);
                }
            });

            const sectoresKMLLayer = omnivore.kml(sectoresURL, null, customLayerSectores);

            sectoresKMLLayer.on('ready', function() {
                this.addTo(sectoresLayer);
                URL.revokeObjectURL(sectoresURL); 
            });

            const legend = L.control({ position: 'bottomright' });
            legend.onAdd = function(map) {
                const div = L.DomUtil.create('div', 'legend');
                div.innerHTML = '<h4>Sectores</h4>';

                for (const [nombre, color] of Object.entries(coloresSectores)) {
                    div.innerHTML += `
                        <div class="legend-item">
                            <span class="legend-color" style="background-color: ${color}"></span>
                            <span>${nombre}</span>
                        </div>
                    `;
                }

                div.innerHTML += '<hr style="margin: 8px 0;"><div class="legend-item"><span class="legend-color" style="background-color: #000000; border-color: #000000;"></span><span>Cuadrantes (delineado)</span></div>';

                return div;
            };
            legend.addTo(map);

            let heatLayer = null;
            let allData = []; 
            let currentHeatData = []; 
            const fileInput = document.getElementById('fileInput');
            const loader = document.getElementById('loader');
            const heatmapControls = document.getElementById('heatmap-controls');
            const filterControls = document.getElementById('filter-controls');
            const radiusSlider = document.getElementById('radius');
            const blurSlider = document.getElementById('blur');
            const radiusValueSpan = document.getElementById('radius-value');
            const blurValueSpan = document.getElementById('blur-value');
            const startDateInput = document.getElementById('startDate');
            const endDateInput = document.getElementById('endDate');
            const tipoFilterSelect = document.getElementById('tipoFilter');
            const filterBtn = document.getElementById('filterBtn');

            function redrawHeatmap() {
                if (heatLayer) map.removeLayer(heatLayer);
                if (currentHeatData.length === 0) return;

                const pointsToDraw = currentHeatData.map(d => d.point).filter(p => p !== null);

                if(pointsToDraw.length === 0) return;

                heatLayer = L.heatLayer(pointsToDraw, { 
                    radius: parseInt(radiusSlider.value, 10),
                    blur: parseInt(blurSlider.value, 10),
                    maxZoom: 18,
                }).addTo(map);
            }

            function applyFiltersAndRedraw() {
                const startDate = startDateInput.value ? new Date(startDateInput.value) : null;
                const endDate = endDateInput.value ? new Date(endDateInput.value) : null;
                const selectedTipos = Array.from(tipoFilterSelect.selectedOptions).map(opt => opt.value);

                if (startDate) startDate.setHours(0, 0, 0, 0);
                if (endDate) endDate.setHours(23, 59, 59, 999);

                currentHeatData = allData.filter(d => {
                    let dateMatch = true;
                    if (d.fecha) {
                        const itemDate = d.fecha;
                        if (startDate && itemDate < startDate) dateMatch = false;
                        if (endDate && itemDate > endDate) dateMatch = false;
                    }

                    let tipoMatch = true;
                    if (selectedTipos.length > 0) {
                        tipoMatch = selectedTipos.includes(d.tipo);
                    }

                    return dateMatch && tipoMatch;
                });
                
                redrawHeatmap();
            }

            fileInput.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (!file) return;

                loader.style.display = 'block';
                const reader = new FileReader();

                reader.onload = function (event) {
                    try {
                        const data = event.target.result;
                        const workbook = XLSX.read(data, { type: 'binary', cellDates: true });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet);
                        
                        const tipos = new Set();
                        allData = jsonData.map(row => {
                            const lat = row.latitud || row.LATITUD;
                            const lon = row.longitud || row.LONGITUD;
                            const tipo = row.TIPO || row.tipo;
                            const fecha = row.FECHA || row.fecha;

                            if (tipo) tipos.add(tipo);

                            const parsedLat = parseFloat(lat);
                            const parsedLon = parseFloat(lon);
                            const intensity = parseFloat(row.intensidad || 1.0);
                            
                            let point = null;
                            if (!isNaN(parsedLat) && !isNaN(parsedLon)) {
                                point = [parsedLat, parsedLon, intensity];
                            }
                            
                            return {
                                point: point,
                                fecha: fecha instanceof Date ? fecha : null,
                                tipo: tipo
                            };
                        }).filter(d => d.point !== null);
                        
                        currentHeatData = [...allData];

                        if (currentHeatData.length === 0) {
                            alert("No se encontraron datos de coordenadas válidos en el archivo.");
                            heatmapControls.style.opacity = '0.5';
                            heatmapControls.style.pointerEvents = 'none';
                            filterControls.style.opacity = '0.5';
                            filterControls.style.pointerEvents = 'none';
                            if(heatLayer) map.removeLayer(heatLayer);
                            return;
                        }

                        if ($(tipoFilterSelect).data('select2')) {
                            $(tipoFilterSelect).select2('destroy');
                        }
                        tipoFilterSelect.innerHTML = '';
                        tipos.forEach(tipo => {
                            const option = document.createElement('option');
                            option.value = tipo;
                            option.textContent = tipo;
                            tipoFilterSelect.appendChild(option);
                        });
                        $(tipoFilterSelect).select2({
                            placeholder: 'Seleccionar tipo(s)',
                            width: '200px',
                            allowClear: true
                        });

                        heatmapControls.style.opacity = '1';
                        heatmapControls.style.pointerEvents = 'auto';
                        filterControls.style.opacity = '1';
                        filterControls.style.pointerEvents = 'auto';
                        fileInput.style.display = 'none';

                        redrawHeatmap();
                        map.setView([19.702879635698825, -101.19232863317521], 11);

                    } catch (error) {
                        console.error("Error al procesar el archivo:", error);
                        alert("Hubo un error al procesar el archivo.");
                    } finally {
                        loader.style.display = 'none';
                    }
                };

                reader.onerror = function(error) {
                    console.error("Error al leer el archivo:", error);
                    alert("No se pudo leer el archivo.");
                    loader.style.display = 'none';
                };

                reader.readAsBinaryString(file);
            });

            radiusSlider.addEventListener('input', function() {
                radiusValueSpan.textContent = this.value;
                redrawHeatmap();
            });

            blurSlider.addEventListener('input', function() {
                blurValueSpan.textContent = this.value;
                redrawHeatmap();
            });

            filterBtn.addEventListener('click', applyFiltersAndRedraw);

            document.getElementById('toggleCuadrantes').addEventListener('change', function(e) {
                if (e.target.checked) {
                    map.addLayer(cuadrantesLayer);
                } else {
                    map.removeLayer(cuadrantesLayer);
                }
            });

            document.getElementById('toggleSectores').addEventListener('change', function(e) {
                if (e.target.checked) {
                    map.addLayer(sectoresLayer);
                } else {
                    map.removeLayer(sectoresLayer);
                }
            });

            const sectoresOpacitySlider = document.getElementById('sectoresOpacity');
            const opacityValueSpan = document.getElementById('opacity-value');

            sectoresOpacitySlider.addEventListener('input', function() {
                const opacityPercent = parseInt(this.value, 10);
                opacityValueSpan.textContent = opacityPercent;

                const opacityValue = opacityPercent / 100;

                sectoresLayer.eachLayer(function(layer) {
                    if (layer.setStyle) {
                        layer.setStyle({
                            fillOpacity: opacityValue
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>
